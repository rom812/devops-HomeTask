events {
    worker_connections 1024;
}

http {
    # Rate Limiting Configuration
    # ---------------------------
    # Algorithm: leaky bucket
    # $binary_remote_addr = track by client IP (binary = memory efficient)
    # zone=ratelimit:10m  = name it "ratelimit", allocate 10MB of shared memory (~160k IPs)
    # rate=5r/s = allow 5 requests per second (1 request every 200ms)
    #
    # To change the rate limit threshold:
    #   - Modify the "rate" value (e.g., rate=10r/s for 10 requests per second)
    #   - Modify the "burst" value in the server block to adjust burst tolerance
    #   - Reload nginx: nginx -s reload
    limit_req_zone $binary_remote_addr zone=ratelimit:10m rate=5r/s;

    # Server 1: Custom HTML response with rate limiting (port 8080)
    # Uses try_files instead of "return" because "return" executes in the
    # rewrite phase, which runs BEFORE the rate limiting check (preaccess phase).
    # try_files runs in the content phase, after rate limiting is applied.
    server {
        listen 8080;

        # Apply rate limiting:
        # burst=10 = allow up to 10 extra requests beyond the 5r/s rate
        # nodelay  = process burst requests immediately instead of queuing them
        limit_req zone=ratelimit burst=10 nodelay;

        root /var/www/html;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }
    }

    # Server 2: HTTP error response (port 8081)
    # Returns 403 Forbidden to simulate a restricted endpoint
    server {
        listen 8081;
        location / {
            return 403 "Forbidden\n";
        }
    }

    # Server 3 (Advanced): HTTPS with self-signed certificate (port 8443)
    # Demonstrates SSL/TLS termination - the proxy handles encryption
    # so backend services don't have to
    server {
        listen 8443 ssl;
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        root /var/www/html;
        index index.html;

        location / {
            try_files $uri $uri/ =404;
        }
    }
}
